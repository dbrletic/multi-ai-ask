<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multi-AI Quarkus Demo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Ask Three AIs</h1>

  <!-- Text-only question form -->
  <form id="ask-form" class="mb-3">
    <div class="mb-3">
      <label for="question" class="form-label">Question (no file)</label>
      <textarea id="question" class="form-control" rows="3"
                placeholder="Ask anything..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Ask</button>
  </form>

  <!-- File upload form -->
  <hr class="my-4">

  <h2 class="mb-3">Ask with a file</h2>
  <form id="ask-file-form" class="mb-3" enctype="multipart/form-data">
    <div class="mb-3">
      <label for="file" class="form-label">File</label>
      <input type="file" id="file" name="file" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="file-question" class="form-label">Optional question about the file</label>
      <textarea id="file-question" name="question" class="form-control" rows="3"
                placeholder="E.g. summarize this document, extract key decisions, etc."></textarea>
    </div>
    <button type="submit" class="btn btn-secondary">Ask with file</button>
  </form>

  <div id="status" class="text-muted mb-3"></div>

  <h3>Unified answer</h3>
  <pre id="answer-unified" class="bg-white p-3 border rounded mb-4"
       style="white-space: pre-wrap;"></pre>

  <div class="row">
    <div class="col-md-4 mb-3">
      <h4>Claude</h4>
      <pre id="answer-claude" class="bg-white p-3 border rounded"
           style="white-space: pre-wrap;"></pre>
    </div>
    <div class="col-md-4 mb-3">
      <h4>OpenAI</h4>
      <pre id="answer-openai" class="bg-white p-3 border rounded"
           style="white-space: pre-wrap;"></pre>
    </div>
    <div class="col-md-4 mb-3">
      <h4>Perplexity</h4>
      <pre id="answer-perplexity" class="bg-white p-3 border rounded"
           style="white-space: pre-wrap;"></pre>
    </div>
  </div>
</div>

<script>
  const askForm = document.getElementById('ask-form');
  const questionInput = document.getElementById('question');
  const askFileForm = document.getElementById('ask-file-form');
  const fileInput = document.getElementById('file');
  const fileQuestionInput = document.getElementById('file-question');

  const statusEl = document.getElementById('status');
  const unifiedEl = document.getElementById('answer-unified');
  const claudeEl = document.getElementById('answer-claude');
  const openaiEl = document.getElementById('answer-openai');
  const perplexityEl = document.getElementById('answer-perplexity');

  function clearAnswers() {
    unifiedEl.textContent = '';
    claudeEl.textContent = '';
    openaiEl.textContent = '';
    perplexityEl.textContent = '';
  }

  function showAnswers(data) {
    unifiedEl.textContent = data.unified || '(no unified answer)';
    claudeEl.textContent = data.claude || '(no answer)';
    openaiEl.textContent = data.openai || '(no answer)';
    perplexityEl.textContent = data.perplexity || '(no answer)';
  }

  // Text-only form
  askForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = questionInput.value.trim();
    if (!question) return;

    statusEl.textContent = 'Asking all three AIs (text only)...';
    clearAnswers();

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (!res.ok) {
        statusEl.textContent = 'Backend error: ' + res.status;
        return;
      }

      const data = await res.json();
      showAnswers(data);
      statusEl.textContent = '';
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'Network error';
    }
  });

  // File upload form
  askFileForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!fileInput.files || fileInput.files.length === 0) {
      return;
    }

    statusEl.textContent = 'Uploading file and asking all three AIs...';
    clearAnswers();

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    if (fileQuestionInput.value.trim()) {
      formData.append('question', fileQuestionInput.value.trim());
    }

    try {
      const res = await fetch('/ask-file', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        statusEl.textContent = 'Backend error: ' + res.status;
        return;
      }

      const data = await res.json();
      showAnswers(data);
      statusEl.textContent = '';
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'Network error';
    }
  });
</script>
</body>
</html>
